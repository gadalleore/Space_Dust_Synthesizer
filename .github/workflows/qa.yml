name: QA - Space Dust

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

# A newer push supersedes an in-flight run on the same ref (saves runner time;
# superseded runs show as "cancelled" by design - the latest commit still runs).
concurrency:
  group: qa-${{ github.ref }}
  cancel-in-progress: true

jobs:
  qa-windows:
    runs-on: windows-2022   # pinned: windows-latest (now Server 2025) breaks the "Visual Studio 17 2022" generator
    timeout-minutes: 50

    env:
      JUCE_REF: 8.0.12  # matches local dev + the JUCE version the patches/ scripts target
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true  # address Node 20 deprecation warnings on actions/checkout + upload-artifact

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Checkout JUCE
        uses: actions/checkout@v4
        with:
          repository: juce-framework/JUCE
          ref: ${{ env.JUCE_REF }}
          path: JUCE

      # The plugin's local JUCE patches live outside this repo (in the JUCE tree), so a
      # fresh checkout doesn't have them. Re-apply here so CI builds match what ships.
      # Each script exits non-zero if its anchor text is missing (JUCE version drift) so
      # a stale patch fails loudly instead of silently building an unpatched binary.
      # Run in separate steps: PowerShell 'exit' ends the whole session, so chaining two
      # scripts in one step would stop after the first.
      - name: Apply JUCE MPE patch
        shell: pwsh
        run: ./patches/apply-juce-mpe-patch.ps1 -JucePath "${{ github.workspace }}/JUCE"

      - name: Apply JUCE keyboard-focus patch (FL typing keyboard)
        shell: pwsh
        run: ./patches/apply-juce-keyboard-focus-patch.ps1 -JucePath "${{ github.workspace }}/JUCE"

      - name: Configure CMake
        shell: pwsh
        run: |
          cmake -B build -G "Visual Studio 17 2022" -A x64 `
                -DJUCE_DIR="${{ github.workspace }}/JUCE" `
                -DCMAKE_BUILD_TYPE=Release

      - name: Build (Release, serial)
        shell: pwsh
        run: cmake --build build --config Release -j 1

      - name: Download pluginval
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}   # authenticate the api.github.com call (avoids shared-IP 403 rate limits)
        run: ./download-pluginval.ps1

      - name: "Run pluginval (CI smoke: strictness 4, repeat 1, no GUI tests)"
        shell: pwsh
        timeout-minutes: 12
        run: ./run-pluginval.ps1 -NoBuild -BuildDir "${{ github.workspace }}/build" -Strictness 4 -Repeat 1 -SkipGuiTests

      - name: Run full QA (static checks + crash-marker hygiene)
        shell: pwsh
        run: ./run-full-qa.ps1 -SkipBuild -SkipPluginval -SkipInstaller

      - name: Upload VST3 artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: SpaceDust-VST3
          path: build/SpaceDust_artefacts/Release/VST3/Space Dust.vst3/**
          if-no-files-found: warn

      - name: Upload Standalone artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: SpaceDust-Standalone
          path: build/SpaceDust_artefacts/Release/Standalone/Space Dust.exe
          if-no-files-found: warn

      - name: Upload pluginval log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pluginval-report
          path: build/pluginval-report.log
          if-no-files-found: ignore

  qa-macos:
    runs-on: macos-latest   # Apple Silicon runner — catches Clang/MSVC divergence + validates the AU
    timeout-minutes: 50

    env:
      JUCE_REF: 8.0.12  # keep in lockstep with qa-windows
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Checkout JUCE
        uses: actions/checkout@v4
        with:
          repository: juce-framework/JUCE
          ref: ${{ env.JUCE_REF }}
          path: JUCE

      # Re-apply the local JUCE patch the Mac build needs (MPE param-surface trim, in the
      # cross-platform VST3 client). The keyboard-focus patch is Windows-only (it edits
      # juce_Windowing_windows.cpp, not compiled here), so it's not applied on macOS.
      # pwsh is preinstalled on GitHub macOS runners.
      - name: Apply JUCE MPE patch
        shell: pwsh
        run: ./patches/apply-juce-mpe-patch.ps1 -JucePath "${{ github.workspace }}/JUCE"

      - name: Configure CMake (Xcode)
        run: |
          cmake -B build -G Xcode \
                -DJUCE_DIR="${{ github.workspace }}/JUCE" \
                -DCMAKE_OSX_ARCHITECTURES="arm64;x86_64"

      - name: Build (Release)
        run: cmake --build build --config Release

      - name: Install AU for validation
        run: |
          mkdir -p "$HOME/Library/Audio/Plug-Ins/Components"
          cp -R "build/SpaceDust_artefacts/Release/AU/Space Dust.component" \
                "$HOME/Library/Audio/Plug-Ins/Components/"
          killall -9 AudioComponentRegistrar 2>/dev/null || true

      - name: Validate AU (auval)
        run: auval -v aumu SpDs YcPl

      - name: Upload AU artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: SpaceDust-AU
          path: build/SpaceDust_artefacts/Release/AU/Space Dust.component/**
          if-no-files-found: warn

      - name: Upload macOS VST3 artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: SpaceDust-VST3-macOS
          path: build/SpaceDust_artefacts/Release/VST3/Space Dust.vst3/**
          if-no-files-found: warn

  qa-installer:
    runs-on: windows-2022
    needs: qa-windows
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    timeout-minutes: 30
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Inno Setup
        shell: pwsh
        run: choco install innosetup --no-progress -y

      - name: Download VST3 artifact
        uses: actions/download-artifact@v4
        with:
          name: SpaceDust-VST3
          path: installer/Files/VST3/Space Dust.vst3

      - name: Download Standalone artifact
        uses: actions/download-artifact@v4
        with:
          name: SpaceDust-Standalone
          path: installer/Files/Standalone

      - name: Compile installer
        shell: pwsh
        run: |
          $iscc = 'C:\Program Files (x86)\Inno Setup 6\ISCC.exe'
          & $iscc installer/SpaceDust-Setup.iss
          if ($LASTEXITCODE -ne 0) { throw "ISCC failed" }

      - name: Upload installer
        uses: actions/upload-artifact@v4
        with:
          name: SpaceDust-Installer
          path: installer/Output/*.exe
